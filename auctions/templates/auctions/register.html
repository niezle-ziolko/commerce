{% extends "auctions/layout.html" %}
<!-- Extends the base layout -->

{% block body %}
    <div style="display: flex;">
        <!-- Container for the registration content -->

        <div style="width: 50%;">
            <!-- Image section -->
            <img class="logo" src="/static/auctions/register.webp" style="width: 100%; border-radius: 15px;" alt="Register">
        </div>

        <div class="register-box">
            <!-- Registration form section -->
            <div>
                <h2 class="login-title">Create an account</h2>
                <!-- Registration title -->

                {% if message %}
                    <span class="error">{{ message }}</span>
                    <!-- Display error message if it exists -->
                {% endif %}

                <form class="form-box" action="{% url 'register' %}" method="post" style="margin-bottom: 1em;">
                    {% csrf_token %}
                    <!-- CSRF token for security -->

                    <input class="form-control" autofocus type="text" name="username" placeholder="Username" style="width: 350px;">
                    <!-- Input for username -->

                    <input class="form-control" type="email" name="email" placeholder="Email Address" style="width: 350px;">
                    <!-- Input for email -->

                    <input class="form-control" type="password" name="password" placeholder="Password" style="width: 350px;">
                    <!-- Input for password -->

                    <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password" style="width: 350px;">
                    <!-- Input for password confirmation -->

                    <button class="button-offer" type="submit">Create account</button>
                    <!-- Submit button -->
                </form>

                <span style="font-size: 14px;">
                    Already have an account? 
                    <a href="{% url 'login' %}" style="text-decoration: underline;">Log In here.</a>
                </span>
                <!-- Link to login page -->
            </div>
        </div>
    </div>
{% endblock %}
<!-- End body block -->
