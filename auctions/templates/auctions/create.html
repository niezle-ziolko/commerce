{% extends "auctions/layout.html" %}

{% block body %}
    <h2>Create Listing</h2>
    <form action="{% url 'insert' %}" method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}:</label>
            {{ field }}
        {% endfor %}
        <input class="btn btn-primary" type="submit" value="Create">
    </form>
{% endblock %}
